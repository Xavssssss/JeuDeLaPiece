<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <title>Jeu No Arg</title>

  <style>
    body {
      margin: 0;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #5fbf7a, #3aa66f);
      color: #2b2b2b;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #titre {
      font-size: 3em;
      margin-top: 20px;
      color: #ff4d6d;
      text-shadow: 2px 2px 0 #1f7a3a;
      text-align: center;
    }

    #joinContainer input {
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    #joinContainer button,
    .btn {
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #ff4d6d, #ff85a2);
      color: white;
      font-weight: bold;
    }

    #listeJoueurs div {
      background: rgba(255,255,255,0.7);
      padding: 10px;
      border-radius: 15px;
      width: 220px;
      display: flex;
      justify-content: space-between;
      margin: 5px;
    }

    #round {
      display: none;
      width: 100%;
      height: 100vh;
      position: relative;
      text-align: center;
    }

    .screen {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
    }

    #callScreen,
    #twitterScreen {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 12px solid #2ecc71;
      background: #ff6b81;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<h1 id="titre">No Arg 🍉</h1>

<div id="index">
  <div id="joinContainer">
    <input type="text" id="nomJoueur" placeholder="Entrez votre nom">
    <button onclick="rejoindreJeu()">Rejoindre</button>
  </div>

  <h3>Joueurs :</h3>
  <div id="listeJoueurs"></div>

  <button onclick="commencerJeu()">START</button>
</div>

<div id="round">

  <div id="callScreen" class="screen">
    <div>📞 Appel de</div>
    <div id="playerNamePhone"></div>
    <button class="btn" onclick="decrocherAppel()">Décrocher</button>
  </div>

  <div id="twitterScreen" class="screen">
    <div id="questionPhone"></div>
    <button class="btn" onclick="nouveauRound()">Next</button>
  </div>

</div>

<script>

var socket = io({
  transports: ['websocket'],
  upgrade: false
});

var room = Math.random().toString(36).substring(2, 8);

// ================= JOIN =================
function rejoindreJeu() {
  const nom = document.getElementById("nomJoueur").value.trim();
  if (nom) {
    socket.emit('NouvJoueurNoArg', {
      room: room,
      pseudo: nom
    });
    document.getElementById("nomJoueur").value = "";
  }
}

// ================= START =================
function commencerJeu() {
  document.getElementById("index").style.display = "none";
  document.getElementById("round").style.display = "block";
  document.getElementById("callScreen").style.display = "block";

  socket.emit('lancerRoundNoArg', { room: room });
}

// ================= PHONE =================
function showPhoneCall(name) {
  document.getElementById("playerNamePhone").textContent = name;
}

function decrocherAppel() {
  document.getElementById("callScreen").style.display = "none";
  document.getElementById("twitterScreen").style.display = "block";

  socket.emit('demandeQuestionNoArg', { room: room });
}

// ================= QUESTION =================
function showQuestion(q) {
  document.getElementById("questionPhone").textContent = q;
}

function nouveauRound() {
  document.getElementById("twitterScreen").style.display = "none";
  document.getElementById("callScreen").style.display = "block";

  socket.emit('lancerRoundNoArg', { room: room });
}

// ================= RESET =================
function leaveGame() {
  socket.emit('resetRoomNoArg', { room: room });
  location.reload();
}

// ================= LISTE =================
socket.on('majListeNoArg', (liste) => {
  const zone = document.getElementById("listeJoueurs");
  zone.innerHTML = "";

  liste.forEach(j => {
    const div = document.createElement("div");

    const span = document.createElement("span");
    span.textContent = j;

    const btn = document.createElement("button");
    btn.textContent = "❌";

    btn.onclick = () => {
      socket.emit('SupprimerJoueurNoArg', {
        room: room,
        pseudo: j
      });
    };

    div.appendChild(span);
    div.appendChild(btn);
    zone.appendChild(div);
  });
});

// ================= EVENTS =================
socket.on('AfficheNomJoueurRNoArg', (data) => {
  if (data) showPhoneCall(data);
});

socket.on('AfficherQuestionNoArg', (data) => {
  if (data) showQuestion(data);
});

socket.on('ResPileFaceNoArg', (data) => {
  console.log("Pile ou Face :", data);
});

</script>

</body>
</html>
