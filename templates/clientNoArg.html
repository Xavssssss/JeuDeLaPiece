<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <title>Jeu de la Pièce</title>

  <style>
    body {
      margin: 0;
      font-family: 'Fredoka One', cursive;
      background: linear-gradient(135deg, #5fbf7a, #3aa66f);
      color: #2b2b2b;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  
    /* ===== PLAGE ===== */
    body::after {
      content: "";
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      background: linear-gradient(to top, #f4d7a1, #f7e3b5);
      z-index: -3;
    }
  
    /* ===== VAGUES ===== */
    body::before {
      content: "";
      position: fixed;
      bottom: 120px;
      left: 0;
      width: 200%;
      height: 120px;
      background: linear-gradient(
        180deg,
        rgba(0, 150, 200, 0.6),
        rgba(0, 110, 170, 0.9)
      );
      border-radius: 50% 50% 0 0;
      animation: waveMove 6s linear infinite;
      z-index: -2;
      opacity: 0.9;
    }
  
    .wave-foam {
      position: fixed;
      bottom: 120px;
      left: 0;
      width: 200%;
      height: 30px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.8) 0px,
        rgba(255,255,255,0.8) 10px,
        rgba(255,255,255,0) 10px,
        rgba(255,255,255,0) 20px
      );
      animation: foamMove 4s linear infinite;
      z-index: -1;
      opacity: 0.6;
    }
  
    @keyframes waveMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  
    @keyframes foamMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  
    /* ===== PALMIERS ===== */
    .palm {
      position: fixed;
      bottom: 80px;
      width: 120px;
      height: 220px;
      z-index: -2;
      opacity: 0.85;
    }
  
    .palm::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 18px;
      height: 140px;
      background: linear-gradient(180deg, #8b5a2b, #5c3b1e);
      border-radius: 10px;
      transform: translateX(-50%);
    }
  
    .palm::after {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 140px;
      height: 140px;
      transform: translateX(-50%);
      background: radial-gradient(circle at center,
        #2ecc71 0%,
        #27ae60 40%,
        transparent 70%);
      clip-path: polygon(
        50% 0%,
        60% 20%,
        100% 20%,
        70% 40%,
        90% 70%,
        50% 50%,
        10% 70%,
        30% 40%,
        0% 20%,
        40% 20%
      );
      animation: palmWave 4s ease-in-out infinite;
    }
  
    .palm-left { left: 40px; transform: rotate(-6deg); }
    .palm-right { right: 40px; transform: rotate(6deg); }
  
    @keyframes palmWave {
      0% { transform: translateX(-50%) rotate(0deg); }
      50% { transform: translateX(-50%) rotate(6deg); }
      100% { transform: translateX(-50%) rotate(0deg); }
    }
  
    /* ===== UI ===== */
  
    #titre {
      font-size: 3em;
      text-align: center;
      margin-top: 20px;
      color: #ff4d6d;
      text-shadow: 2px 2px 0 #1f7a3a;
    }
  
    #index {
      text-align: center;
      padding: 20px;
    }
  
    #joinContainer input {
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: #fff;
    }
  
    #joinContainer button,
    #commencer button,
    .btn {
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #ff4d6d, #ff85a2);
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }
  
    #joinContainer button:hover,
    #commencer button:hover,
    .btn:hover {
      transform: scale(1.05);
    }
  
    #listeJoueurs {
      display: flex;
      flex-direction: column;
      align-items: center; /* 👉 centre horizontalement */
      gap: 6px;
    }
  
    #listeJoueurs div {
      background: rgba(255, 255, 255, 0.7);
      padding: 10px;
      border-radius: 15px;
      width: 220px;
      display: flex;
      justify-content: space-between;
    }
  
    #listeJoueurs button {
      background: #ff4d6d;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }
  
    #btnSortir img {
      width: 55px;
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }
  
    /* ===== ROUND ===== */
  
    #round {
      width: 100%;
      height: 100vh;
      position: relative;
    }
  
    .screen {
      display: none;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
    }
  
    /* ===== 🍉 PASTÈQUE SCREENS ===== */
  
    #callScreen,
    #twitterScreen {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border: 14px solid #2ecc71;
  
      /* CENTRAGE PARFAIT */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      padding: 20px;
    }
  
    /* chair */
    #callScreen::before,
    #twitterScreen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%,
        #ff4d6d 0%,
        #ff6b81 60%,
        #ff85a2 100%
      );
      z-index: 0;
    }
  
    /* pépins noirs */
    #callScreen::after,
    #twitterScreen::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, #000 2px, transparent 3px),
        radial-gradient(circle, #000 2px, transparent 3px);
      background-size: 40px 40px;
      background-position: 10px 10px, 25px 25px;
      opacity: 0.25;
      z-index: 1;
    }
  
    #callScreen > *,
    #twitterScreen > * {
      position: relative;
      z-index: 2;
    }
  
    #questionPhone {
      font-size: 1.3em;
      margin: 20px 0;
    }
  
  </style>
</head>

<body>

  <!-- 🌴 PALMIERS -->
  <div class="palm palm-left"></div>
  <div class="palm palm-right"></div>

  <button id="btnSortir" onclick="leaveGame()">
    <img src="{{ url_for('static', filename='btnSortir.png') }}" alt="Sortir"/>
  </button>

  <div id="index">
    <h1 id="titre">Jeu de la Pièce 🍉</h1>

    <div id="joinContainer">
      <input type="text" id="nomJoueur" placeholder="Entrez votre nom">
      <button onclick="rejoindreJeu()">Rejoindre le jeu</button>
    </div>

    <h3>Liste des joueurs :</h3>
    <div id="listeJoueurs"></div>

    <div id="commencer">
      <button onclick="commencerJeu()">START !</button>
    </div>
  </div>

  <div id="round" style="display:none;">

    <div id="callScreen" class="screen">
      <div>📞 Appel entrant de</div>
      <div id="playerNamePhone"></div>

      <button class="btn" id="btnDecrocherPhone" onclick="decrocherAppel()">
        Décrocher
      </button>
    </div>

    <div id="twitterScreen" class="screen">
      <div id="questionPhone"></div>

      <button class="btn" onclick="nouveauRound()">
        Nouveau Round
      </button>
    </div>

  </div>

<script>

  var socket = io({
    transports: ['websocket'],
    upgrade: false
  });

  var room = Math.random().toString(36).substring(2, 8);

  function resetRound() {
    document.getElementById("round").style.display = 'none';
    document.getElementById("index").style.display = 'block';
    document.getElementById("twitterScreen").style.display = 'none';
    document.getElementById("callScreen").style.display = 'none';
  }

  function rejoindreJeu() {
    const nomJoueur = document.getElementById("nomJoueur").value.trim();
    if (nomJoueur) {
      socket.emit('NouvJoueurNoArg', { room: room, pseudo: nomJoueur });
      document.getElementById("nomJoueur").value = "";
    }
  }

  function commencerJeu() {
    resetRound();
    document.getElementById("index").style.display = 'none';
    document.getElementById("round").style.display = 'block';
    document.getElementById("callScreen").style.display = 'block';

    socket.emit('lancerRoundNoArg', { room: room });
  }

  function showPhoneCall(playerName) {
    document.getElementById("playerNamePhone").textContent = playerName;
  }

  function decrocherAppel() {
    document.getElementById("callScreen").style.display = "none";
    document.getElementById("twitterScreen").style.display = "block";

    socket.emit('demandeQuestionNoArg', { room: room });
  }

  function showTwitterQuestion(question) {
    document.getElementById("questionPhone").textContent = question;
  }

  function nouveauRound() {
    document.getElementById("twitterScreen").style.display = "none";
    document.getElementById("callScreen").style.display = "block";

    socket.emit('lancerRoundNoArg', { room: room });
  }

  function leaveGame() {
    socket.emit('resetRoomNoArg', { room: room });
    resetRound();
  }

  socket.on('majListe', (liste) => {
    const zone = document.getElementById("listeJoueurs");
    zone.innerHTML = "";

    liste.forEach(joueur => {
      const div = document.createElement("div");

      const nom = document.createElement("span");
      nom.textContent = joueur;

      const btn = document.createElement("button");
      btn.textContent = "❌";

      btn.onclick = () => {
        socket.emit('SupprimerJoueur', {
          room: room,
          pseudo: joueur
        });
      };

      div.appendChild(nom);
      div.appendChild(btn);
      zone.appendChild(div);
    });
  });

  socket.on('AfficheNomJoueurR', (data) => {
    if (data) showPhoneCall(data);
  });

  socket.on('AfficherQuestion', (data) => {
    if (data) showTwitterQuestion(data);
  });

</script>

</body>
</html>
