<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <title>Casino</title>

  <style>
    html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Fredoka One', cursive;

  background: radial-gradient(circle at top, #111, #000) !important;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* ===== TITRE ===== */
h1 {
  font-size: 70px;
  margin-top: 40px;
  color: white;
  text-shadow: 0 0 10px red, 0 0 25px red;
  letter-spacing: 3px;
}

/* ===== CENTRAGE TOTAL ===== */
#index {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  text-align: center;
}

/* ===== RESULTAT ===== */
#resultat {
  margin: 20px auto;
  padding: 30px;
  width: 90vw;
  max-width: 1200px;

  border-radius: 20px;
  background: rgba(255, 0, 0, 0.05);
  border: 2px solid red;
  box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);

  font-size: 28px;
}

/* ===== ROULEAUX ===== */
#rouleaux {
  margin-top: 20px;
  font-size: 80px;
  letter-spacing: 20px;
  padding: 30px;

  border-radius: 15px;

  background: #000 !important;
  color: #fff !important;

  border: 2px solid #ff0000;
  box-shadow: inset 0 0 25px red;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

/* ===== MESSAGE ===== */
#message {
  margin-top: 15px;
  font-size: 22px;
}

/* ===== BOUTON ===== */
button {
  margin-top: 30px;
  padding: 15px 45px;
  font-size: 22px;

  border: none;
  border-radius: 12px;
  cursor: pointer;

  background: linear-gradient(45deg, red, black);
  color: white;
  font-weight: bold;

  box-shadow: 0 0 15px red;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px red;
}

button:active {
  transform: scale(0.95);
}

/* ===== BOUTON SORTIR ===== */
#btnSortir {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;

  background: none;
  border: none;
  padding: 0;
  margin: 0;
  box-shadow: none;
}

#btnSortir:hover {
  transform: scale(1.1);
}

#btnSortir:active {
  transform: scale(0.95);
}

#btnSortir img {
  width: 80px;
  height: auto;
  display: block;
}

/* ===== ANIMATION ===== */
.rolling {
  animation: shake 0.1s infinite;
}

@keyframes shake {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(3px); }
}

/* ===== RESULTAT GAIN ===== */
.win {
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88;
}

.lose {
  color: red;
  text-shadow: 0 0 10px red;
}

/* ===== EMOJIS BACKGROUND ===== */
#emoji-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -1;
  pointer-events: none;
}

.emoji {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear forwards;
  opacity: 0.8;
}

@keyframes fall {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  h1 {
    font-size: 45px;
  }

  #rouleaux {
    font-size: 45px;
    letter-spacing: 10px;
    padding: 20px;
  }

  #resultat {
    width: 95vw;
    font-size: 20px;
  }

  button {
    font-size: 18px;
    padding: 12px 30px;
  }
}
  </style>
</head>

<body>

<div id="emoji-bg"></div>
<button id="btnSortir" type="submit">
  <img src="{{ url_for('static', filename='btnSortir.png') }}" alt="Sortir">
</button>
<div id="index">
  <h1>Casino</h1>

  <div id="resultat">
    🎰 Résultat :
    <div id="rouleaux">Clique sur "Lancer !"</div>
    <div id="message"></div>
  </div>

  <button onclick="lancerRoulette()">Lancer !</button>
</div>

<script>
  var socket = io({ transports: ['websocket'], upgrade: false });

  /* 🎰 Lancer roulette avec animation */
  function lancerRoulette() {
    const rouleaux = document.getElementById("rouleaux");
    const message = document.getElementById("message");

    message.textContent = "";
    rouleaux.classList.add("rolling");

    let i = 0;

    const emojis = ["💀", "🎰", "💎", "🍒", "⭐", "🔔"];

    const interval = setInterval(() => {
      rouleaux.textContent =
        emojis[Math.floor(Math.random() * emojis.length)] + " | " +
        emojis[Math.floor(Math.random() * emojis.length)] + " | " +
        emojis[Math.floor(Math.random() * emojis.length)];

      i++;

      if (i > 15) {
        clearInterval(interval);
        rouleaux.classList.remove("rolling");

        socket.emit("lancerRoulette", { message: "go" });
      }
    }, 80);
  }

  /* 🎰 Résultat serveur */
  socket.on("symbole", (data) => {
    const { s1, s2, s3 } = data;

    document.getElementById("rouleaux").textContent =
      `${s1} | ${s2} | ${s3}`;
  });

  socket.on("Resultat", (data) => {
    const message = document.getElementById("message");

    if (data.gain == 0) {
      message.textContent = "💀 Perdu";
      message.className = "lose";
    } else {
      message.textContent = data.message + " x " + data.gain;
      message.className = "win";
    }
  });

  /* 🌧️ pluie d'emojis */
  const emojisBG = ["💀", "🎰", "💎", "🍒", "⭐", "🔔"];

  function createEmoji() {
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");

    emoji.textContent = emojisBG[Math.floor(Math.random() * emojisBG.length)];

    emoji.style.left = Math.random() * 100 + "vw";

    const duration = Math.random() * 3 + 3;
    emoji.style.animationDuration = duration + "s";

    document.getElementById("emoji-bg").appendChild(emoji);

    setTimeout(() => {
      emoji.remove();
    }, duration * 1000);
  }

  setInterval(createEmoji, 200);
</script>

</body>
</html>
