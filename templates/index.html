<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>

    <style>
        * {
            box-sizing: border-box;
        }
    
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 80, 0, 0.35), transparent 35%),
                radial-gradient(circle at bottom, rgba(180, 0, 0, 0.3), transparent 45%),
                linear-gradient(180deg, #240000, #000000);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }
    
    
        /* Titre */
        #titre h1 {
            font-size: 70px;
            margin-top: 50px;
            margin-bottom: 20px;
    
            color: #ff9500;
            letter-spacing: 5px;
            font-weight: 900;
    
            text-shadow:
                0 0 5px #ff0000,
                0 0 15px #ff4500,
                0 0 30px #ff9500,
                0 0 60px red;
    
            animation: fireTitle 2s infinite alternate;
        }
    
    
        @keyframes fireTitle {
            from {
                text-shadow:
                0 0 10px red,
                0 0 25px orange;
            }
    
            to {
                text-shadow:
                0 0 20px orange,
                0 0 50px red;
            }
        }
    
    
        /* Conteneur des jeux */
        #JeuxContaineur {
            margin-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
    
    
        /* Boutons classiques */
        button {
            min-width: 280px;
            padding: 18px 45px;
    
            font-size: 22px;
            font-weight: bold;
            color: white;
    
            border: 2px solid rgba(255, 150, 0, 0.5);
            border-radius: 20px;
    
            cursor: pointer;
    
            background:
                linear-gradient(
                    45deg,
                    #8b0000,
                    #ff3300,
                    #ff9500
                );
    
            box-shadow:
                0 0 15px red,
                inset 0 0 15px rgba(255,255,255,0.2);
    
            transition: 0.3s ease;
        }
    
    
        button:hover {
            transform: translateY(-5px) scale(1.08);
    
            box-shadow:
                0 0 20px orange,
                0 0 50px red,
                inset 0 0 20px white;
        }
    
    
        button:active {
            transform: scale(0.95);
        }
    
    
        /* Bouton Casino */
.casino-btn {
    background: none;
    border: none;
    padding: 0;
    min-width: unset;

    cursor: pointer;
    overflow: hidden;
    border-radius: 40px;

    box-shadow: none;
}


.casino-btn img {
    width: 300px;
    height: auto;

    display: block;
    border-radius: 40px;

    transform: scale(1.08);

    filter:
        drop-shadow(0 0 10px red)
        drop-shadow(0 0 20px orange);

    transition: 0.3s ease;
}


.casino-btn:hover img {
    transform: scale(1.15);

    filter:
        drop-shadow(0 0 20px orange)
        drop-shadow(0 0 40px red);
}


/* Bouton NoArg */
.NoArg-btn {
    background: none;
    border: none;
    padding: 0;
    min-width: unset;

    cursor: pointer;
    overflow: hidden;
    border-radius: 40px;

    box-shadow: none;
}


.NoArg-btn img {
    width: 300px;
    height: auto;

    display: block;
    border-radius: 40px;

    filter:
        drop-shadow(0 0 10px red)
        drop-shadow(0 0 20px orange);

    transition: 0.3s ease;
}


.NoArg-btn:hover img {
    filter:
        drop-shadow(0 0 20px orange)
        drop-shadow(0 0 40px red);
}
    
        @keyframes float {
    
            0% {
                transform: translateY(0px);
            }
    
            50% {
                transform: translateY(-8px);
            }
    
            100% {
                transform: translateY(0px);
            }
    
        }
    
    </style>
</head>

<body>

    <div id="titre">
        <h1>Fuegooos 🔥</h1>
    </div>

    <div id="JeuxContaineur">
        <form action="{{ url_for('client') }}" method="get">
            <button type="submit" class="NoArg-btn">
                <img src="{{ url_for('static', filename='QuienDeNous.png') }}"
                     alt="QuienDeNous">
        </form>

        <form action="{{ url_for('casino') }}" method="get">
            <button type="submit" class="casino-btn">
                <img src="{{ url_for('static', filename='BtnCasa.png') }}"
                     alt="Casino">
            </button>
        </form>
        
        <form action="{{ url_for('noArg') }}" method="get">
            <button type="submit" class="NoArg-btn">
                <img src="{{ url_for('static', filename='BtnNA.png') }}"
                     alt="NoArgumento">
            </button>
        </form>
    </div>

</body>
</html>
